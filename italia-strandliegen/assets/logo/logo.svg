<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 50" fill="none">
  <!-- Italian flag accent line -->
  <rect x="0" y="0" width="400" height="3" rx="1.5">
    <defs>
      <linearGradient id="flag" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#009246"/>
        <stop offset="33%" style="stop-color:#009246"/>
        <stop offset="33%" style="stop-color:#FFFFFF"/>
        <stop offset="66%" style="stop-color:#FFFFFF"/>
        <stop offset="66%" style="stop-color:#CE2B37"/>
        <stop offset="100%" style="stop-color:#CE2B37"/>
      </linearGradient>
    </defs>
  </rect>
  <rect x="0" y="0" width="400" height="3" rx="1.5" fill="url(#flag)"/>
  <!-- Text -->
  <text x="200" y="36" text-anchor="middle" font-family="'Cinzel', serif" font-size="24" font-weight="700" fill="#2C5F7A" letter-spacing="6">ITALIA STRANDLIEGEN</text>
</svg>
